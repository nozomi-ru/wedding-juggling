<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>リフティング最高回数予想</title>
  <style>
    body { font-family: sans-serif; background: #f7f7f7; text-align: center; }
    #main-box { background: #fff; padding:30px; margin:50px auto; border-radius:18px; box-shadow:0 4px 18px #bbb; max-width:350px;}
    input, button { font-size:1.15em; margin:.9em 0;}
    #result-box { margin-top:2em; font-size:1.3em; color:#1675b6;}
  </style>
</head>
<body>
  <div id="main-box">
    <h2>リフティング最高回数予想</h2>
    <form id="game-form" autocomplete="off">
      <label for="user_name">記入者の名前</label><br>
      <input type="text" id="user_name" required placeholder="お名前を入力"><br>
      <label for="predict">最高で「連続」何回できる？</label><br>
      <input type="number" id="predict" min="0" max="150" required placeholder="回数を入力"><br>
      <button type="submit">送信</button>
    </form>
    <div id="result-box" style="display:none"></div>
  </div>
  <script>
    // フォーム送信＆表示制御
    function updateView(val, name) {
      document.getElementById('game-form').style.display = 'none';
      document.getElementById('result-box').style.display = 'block';
      document.getElementById('result-box').innerHTML =
        `記録しました！<br>【${name}】の予想：<b>${val}回</b><br>（Google シートに自動集計済み）`;
    }
    document.getElementById("game-form").onsubmit = async function(e) {
      e.preventDefault();
      const name = document.getElementById("user_name").value;
      const predict = document.getElementById("predict").value;

      if (!name.trim() || !predict.trim()) {
        alert("両方入力してください！");
        return;
      }

      // ▼ここ↓をあなたのApps ScriptデプロイURLに差し替えてください！
      const API_URL = "https://script.google.com/macros/s/AKfycbyr1KkGnM10m8IXcwtFBHe_NUA2una-35VL1kGHN-nw-Db2dLTn8Q6tM2LhfUuCuz66/exec";

      try {
        const resp = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ name, predict }),
          headers: { "Content-Type": "application/json" }
        });
        const text = await resp.text();
        if (text.startsWith("OK")) {
          updateView(predict, name);
        } else {
          alert("送信失敗: " + text);
        }
      } catch (err) {
        alert("ネットワークエラー: " + err.message);
      }
    };
  </script>
</body>
</html>
