<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Lifting Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --color-bg: #FCFBF9;
      --color-text: #2B2B2B;
      --color-gold: #BCA371;
      --color-border: #E8E4DF;
    }

    body {
      font-family: 'Noto Serif JP', 'Yu Mincho', '游明朝', serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    
    #main-box {
      max-width: 440px;
      width: 92vw;
      margin: 40px 0;
      background: #FFFFFF;
      border: 1px solid var(--color-border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
      padding: 3.5em 2em;
      text-align: center;
      box-sizing: border-box;
      position: relative;
    }

    #main-box::before {
      content: '';
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 1px solid #F4F1EC;
      pointer-events: none;
    }

    .header-ornament {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .header-ornament::before,
    .header-ornament::after {
      content: '';
      width: 25px;
      height: 1px;
      background-color: var(--color-gold);
      margin: 0 12px;
    }

    .header-ornament svg {
      width: 10px;
      height: 10px;
      fill: var(--color-gold);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6em;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin: 0 0 8px 0;
      color: var(--color-text);
      text-transform: uppercase;
    }

    .ja-title {
      font-size: 0.8em;
      color: #777;
      letter-spacing: 0.25em;
      margin-bottom: 4em;
      font-weight: 300;
    }

    .input-group {
      margin-bottom: 2.5em;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.85em;
      color: #666;
      margin-bottom: 0.8em;
      letter-spacing: 0.15em;
      text-align: center;
    }

    select, input[type=number] {
      width: 100%;
      font-size: 1.1em;
      padding: 0.7em 0;
      border: 1px solid var(--color-border);
      background: #FAF9F7;
      color: var(--color-text);
      text-align: center;
      font-family: inherit;
      transition: all 0.4s ease;
      border-radius: 0;
      appearance: none;
      box-sizing: border-box;
    }

    select {
      background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2210%22%20height%3D%226%22%20viewBox%3D%220%200%2010%206%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M1%201L5%205L9%201%22%20stroke%3D%22%23BCA371%22%20stroke-width%3D%221.2%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E');
      background-repeat: no-repeat;
      background-position: right 15px center;
      cursor: pointer;
    }

    select:focus, input[type=number]:focus {
      outline: none;
      border-color: var(--color-gold);
      background: #FFFFFF;
      box-shadow: 0 0 0 1px var(--color-gold) inset;
    }
    
    input[type=number]::placeholder {
      color: #D2D2D2;
      font-family: 'Playfair Display', serif;
    }

    button[type=submit] {
      background-color: var(--color-text);
      color: #FFFFFF;
      font-family: 'Playfair Display', 'Noto Serif JP', serif;
      border: 1px solid var(--color-text);
      border-radius: 0;
      padding: 1em 0;
      width: 100%;
      font-size: 0.95em;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.5s ease;
      margin-top: 1.5em;
      text-indent: 0.2em;
    }

    button[type=submit]:hover {
      background-color: #FFFFFF;
      color: var(--color-text);
    }
    
    button[type=submit][disabled] {
      background-color: #E8E4DF;
      border-color: #E8E4DF;
      color: #999;
      cursor: not-allowed;
    }
    
    #error-box {
      color: #9E3A3A;
      background: #FDF9F9;
      border: 1px solid #EAD8D8;
      padding: 0.8em 1em;
      margin: 1.5em 0 0 0;
      display: none;
      font-size: 0.85em;
      text-align: left;
    }

    #result-box {
      display: none;
      animation: fadeIn 1s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .result-title {
      font-family: 'Playfair Display', serif;
      color: var(--color-gold);
      font-size: 1.2em;
      letter-spacing: 0.15em;
      margin-bottom: 2em;
    }

    .your-number {
      font-family: 'Playfair Display', serif;
      color: var(--color-text);
      font-size: 4em;
      margin: 10px 0;
      line-height: 1;
      border-bottom: 1px solid var(--color-gold);
      display: inline-block;
      padding: 0 10px 5px 10px;
    }

    .unit {
      font-size: 0.25em;
      font-family: 'Noto Serif JP', serif;
      color: #666;
      vertical-align: middle;
      margin-left: 6px;
    }

    .cheer-text {
      font-size: 0.85em;
      color: #777;
      line-height: 2;
      margin-top: 2.5em;
      letter-spacing: 0.1em;
    }
    
    hr { 
      border: none; 
      border-top: 1px solid var(--color-border); 
      margin: 3.5em 0;
    }
    
    #vote-results-section {
      display: none;
    }
    
    .section-title {
      font-family: 'Playfair Display', 'Noto Serif JP', serif;
      font-size: 1.05em;
      color: var(--color-text);
      letter-spacing: 0.15em;
      margin-bottom: 1.5em;
    }

    #table-box {
      overflow-x: auto;
      margin-bottom: 2em;
    }

    table { 
      width: 100%;
      border-collapse: collapse; 
      margin: 0 auto; 
    }

    th, td { 
      padding: 1.2em 0.5em; 
      text-align: center;
    }

    th { 
      font-family: 'Playfair Display', serif;
      color: var(--color-gold); 
      font-size: 0.75em; 
      font-weight: 400;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--color-gold);
    }

    td { 
      color: var(--color-text); 
      font-size: 0.9em;
      border-bottom: 1px dashed var(--color-border);
    }

    .highlight-number {
      font-family: 'Playfair Display', serif;
      font-size: 1.3em;
    }

    #loading {
      font-family: 'Playfair Display', serif;
      color: #999;
      font-style: italic;
      font-size: 0.9em;
      margin: 2em 0;
      letter-spacing: 0.1em;
    }

    #error-box2 {
      color: #9E3A3A;
      font-size: 0.85em;
      margin: 1em 0;
      display: none;
    }

    .footer-text {
      font-size: 0.65em;
      color: #CCC;
      letter-spacing: 0.1em;
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>
<body>
  <div id="main-box">

    <!-- ===== 新しいタイトル部 ===== -->
    <div class="header-ornament">
      <svg viewBox="0 0 24 24"><path d="M12 2L22 12L12 22L2 12L12 2Z"/></svg>
    </div>
    <h1>Lifting Challenge</h1>
    <div class="ja-title">リフティング回数予想</div>
    
    <form id="game-form" autocomplete="off">
      <div class="input-group">
        <label for="user_name">テーブル</label>
        <select id="user_name" required>
          <option value="" disabled selected>選択してください</option>
          <option value="A">Table A</option>
          <option value="B">Table B</option>
          <option value="C">Table C</option>
          <option value="D">Table D</option>
          <option value="E">Table E</option>
          <option value="F">Table F</option>
          <option value="G">Table G</option>
          <option value="H">Table H</option>
          <option value="I">Table I</option>
          <option value="J">Table J</option>
        </select>
      </div>
      
      <div class="input-group">
        <label for="predict">予想回数</label>
        <input type="number" id="predict" min="0" max="150" required placeholder="0">
      </div>
      
      <button type="submit" id="submit-btn">SUBMIT</button>
      <div id="error-box"></div>
    </form>

    <!-- ===== 投票完了・結果部 ===== -->
    <div id="result-box">
      <div class="result-title">Thank You</div>
      <div style="font-size:0.85em; color:#666; margin-bottom:1.5em; letter-spacing:0.1em;">
        <span id="your-table-name" style="color:var(--color-text);"></span> の予想
      </div>
      <div class="your-number">
        <span id="your-num">--</span><span class="unit">回</span>
      </div>
      <div class="cheer-text">
        ご投票ありがとうございました。<br>
        結果発表までしばらくお待ちください。
      </div>
    </div>
    
    <hr>

    <!-- ===== みんなの予想一覧 ===== -->
    <div id="vote-results-section">
      <div class="section-title">Guests' Prediction</div>
      <div id="loading">Loading...</div>
      <div id="error-box2"></div>
      <div id="table-box"></div>
      <div class="footer-text">Powered by Google Sheets & SheetDB</div>
    </div>

  </div>

  <script>
    const API_URL = "https://sheetdb.io/api/v1/wtkkjfxa0n81f";
    const FIELD_NAME = "名前";
    const FIELD_PREDICT = "予想回数";
    const FIELD_TIMESTAMP = "タイムスタンプ";
    const STORAGE_KEY = "lifting_quiz_v2";

    const els = {
      form: document.getElementById("game-form"),
      userNameSelect: document.getElementById("user_name"),
      predictInput: document.getElementById("predict"),
      submitBtn: document.getElementById("submit-btn"),
      errBox: document.getElementById("error-box"),
      resultBox: document.getElementById("result-box"),
      yourTableName: document.getElementById("your-table-name"),
      yourNum: document.getElementById("your-num"),
      voteSection: document.getElementById("vote-results-section"),
      tableBox: document.getElementById("table-box"),
      loading: document.getElementById("loading"),
      errBox2: document.getElementById("error-box2")
    };

    window.addEventListener("DOMContentLoaded", () => {
      const savedData = localStorage.getItem(STORAGE_KEY);
      if (savedData) {
        try {
          const { predict, tableName } = JSON.parse(savedData);
          showResult(predict, tableName);
          showVoteResults();
          loadVotes();
        } catch (e) {
          console.warn("Storage parse error", e);
        }
      }
    });

    els.form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();
      disableButton(true);

      const sel = els.userNameSelect;
      const tableName = sel.options[sel.selectedIndex].text;
      const predict = els.predictInput.value.trim();

      if (!sel.value || !predict || isNaN(Number(predict))) {
        showError("正しく入力・選択してください。");
        disableButton(false);
        return;
      }

      // --- 確認アラートの追加 ---
      const confirmMessage = `【 ${tableName} 】\n予想回数： ${predict} 回\n\nご投票後は内容の変更ができません。\nこの内容で送信してよろしいですか？`;
      if (!window.confirm(confirmMessage)) {
        // キャンセルされた場合はボタンを元に戻して処理を中断
        disableButton(false);
        return;
      }
      // --------------------------

      const data = [{
        [FIELD_NAME]: tableName,
        [FIELD_PREDICT]: predict,
        [FIELD_TIMESTAMP]: new Date().toLocaleString("ja-JP")
      }];

      try {
        const resp = await fetch(API_URL, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        });

        if (resp.ok) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ predict, tableName }));
          showResult(predict, tableName);
          showVoteResults();
          loadVotes();
        } else {
          showError(`通信エラーが発生しました (${resp.status})`);
          disableButton(false);
        }
      } catch (err) {
        showError(`ネットワークエラー: ${err.message}`);
        disableButton(false);
      }
    });

    function showResult(predict, tableName) {
      els.form.style.display = 'none';
      els.resultBox.style.display = 'block';
      els.yourTableName.textContent = tableName || "あなた";
      els.yourNum.textContent = predict;
    }

    function showError(msg) {
      els.errBox.style.display = 'block';
      els.errBox.textContent = msg;
    }

    function hideError() {
      els.errBox.style.display = 'none';
      els.errBox.textContent = '';
    }

    function disableButton(flag) {
      els.submitBtn.disabled = !!flag;
      els.submitBtn.textContent = flag ? "SENDING..." : "SUBMIT";
    }

    function showVoteResults() {
      els.voteSection.style.display = 'block';
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"'`]/g, s => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;', '`': '&#x60;'
      }[s]));
    }

    async function loadVotes() {
      els.loading.style.display = "block";
      els.errBox2.style.display = "none";
      els.tableBox.innerHTML = "";

      try {
        const resp = await fetch(API_URL);
        if (!resp.ok) throw new Error(`API Error ${resp.status}`);
        const data = await resp.json();

        els.loading.style.display = "none";
        
        if (!Array.isArray(data) || data.length === 0) {
          els.tableBox.innerHTML = "<div style='color:#999; font-size:0.85em;'>まだデータがありません</div>";
          return;
        }

        data.sort((a, b) => {
          const dateA = new Date(a[FIELD_TIMESTAMP] || 0).getTime();
          const dateB = new Date(b[FIELD_TIMESTAMP] || 0).getTime();
          return dateB - dateA;
        });

        let html = `<table>
          <tr>
            <th>TABLE</th>
            <th>PREDICT</th>
            <th>TIME</th>
          </tr>`;
          
        html += data.map(v =>
          `<tr>
             <td style="font-family:'Playfair Display', serif;">${escapeHTML((v[FIELD_NAME]||"").replace("Table ",""))}</td>
             <td class="highlight-number">${escapeHTML(v[FIELD_PREDICT]||"-")}</td>
             <td style="font-size:0.75em; color:#999; font-family:'Playfair Display', serif;">${(v[FIELD_TIMESTAMP]||"").replace("T"," ").replace(/:\d\d(\.\d+)?Z?$/,"")}</td>
           </tr>`
        ).join('');
        html += "</table>";
        
        els.tableBox.innerHTML = html;

      } catch(e) {
        els.loading.style.display = "none";
        els.errBox2.style.display = "block";
        els.errBox2.textContent = `エラー：${e.message}`;
      }
    }
  </script>
</body>
</html>
